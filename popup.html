<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auto-Microslop</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <main class="panel">
        <h1>Auto-Microslop</h1>

        <button id="togglePause" type="button" class="primary">Pause</button>

        <section>
            <h2>Working mode</h2>
            <div class="mode-selector">
                <label>
                    <input type="radio" name="domainMode" value="blacklist" id="modeBlacklist">
                    <span>Blacklist</span> (replace everywhere except listed domains)
                </label>
                <label>
                    <input type="radio" name="domainMode" value="whitelist" id="modeWhitelist">
                    <span>Whitelist</span> (replace only on listed domains)
                </label>
            </div>
        </section>

        <section>
            <h2>Domain list</h2>
            <div id="domainList" class="list" role="list"></div>

            <div class="add-row">
                <input id="newDomain" type="text" placeholder="Domain (e.g., example.com)" aria-label="Domain">
            </div>
            <button id="addDomain" type="button">Add domain</button>
        </section>

        <section>
            <h2>Text replacement list</h2>
            <div id="replacementList" class="list" role="list"></div>

            <div class="add-row">
                <input id="newFrom" type="text" placeholder="Find text" aria-label="Find text">
                <input id="newTo" type="text" placeholder="Replace with" aria-label="Replace with">
            </div>
            <button id="addEntry" type="button">Add new entry</button>
        </section>
    </main>

    <script src="popup.js"></script>
</body>
</html>
